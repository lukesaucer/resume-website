# Rate limiting zone: 5 requests per minute per IP for the contact form
limit_req_zone $binary_remote_addr zone=contact_form:10m rate=5r/m;

upstream payload_app {
    server payload-app:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Static assets caching
    location /_next/static/ {
        proxy_pass http://payload_app;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        proxy_pass http://payload_app;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Rate-limited contact form endpoint
    location = /api/contact-submissions {
        limit_req zone=contact_form burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://payload_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other requests
    location / {
        proxy_pass http://payload_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
