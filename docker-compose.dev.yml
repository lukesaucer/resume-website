services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: payload
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: ${DB_PASSWORD:-payload}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload"]
      interval: 5s
      timeout: 5s
      retries: 5

  payload-app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    environment:
      DATABASE_URL: postgresql://payload:${DB_PASSWORD:-payload}@postgres:5432/payload
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-dev-secret-change-in-production}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata_dev:
